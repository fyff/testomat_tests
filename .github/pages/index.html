<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Testomat E2E Test Reports</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .report-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn {
            padding: 1rem;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-smoke { background-color: #28a745; }
        .btn-smoke:hover { background-color: #218838; }
        .btn-regression { background-color: #007bff; }
        .btn-regression:hover { background-color: #0069d9; }
    </style>
</head>
<body>
<div class="container">
    <h1>E2E Test Reports</h1>
    <div class="report-links">
        <a class="btn btn-smoke" href="allure/smoke/index.html">Smoke Test Report</a>
        <a class="btn btn-regression" href="allure/regression/index.html">Regression Test Report</a>
    </div>
    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #666;">
        If a report is missing, the suite might not have been run for this build.
    </p>
</div>
</body>
</html>
