<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testomat E2E Test Reports</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 1.5rem; }
        .report-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn {
            padding: 1rem;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-smoke { background-color: #28a745; }
        .btn-smoke:hover { background-color: #218838; }
        .btn-api { background-color: #6f42c1; }
        .btn-api:hover { background-color: #59359a; }
        .btn-web { background-color: #fd7e14; }
        .btn-web:hover { background-color: #e8590c; }
        .btn-regression { background-color: #007bff; }
        .btn-regression:hover { background-color: #0069d9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>E2E Test Reports</h1>
        <div class="report-links">
            <a href="allure/smoke/index.html" class="btn btn-smoke">Smoke Test Report</a>
            <a href="allure/api/index.html" class="btn btn-api">API Test Report</a>
            <a href="allure/web/index.html" class="btn btn-web">Web UI Test Report</a>
            <a href="allure/regression/index.html" class="btn btn-regression">Regression Test Report</a>
        </div>
        <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #666;">
            If a report is missing, the suite might not have been run for this build.
        </p>
    </div>
</body>
</html>
